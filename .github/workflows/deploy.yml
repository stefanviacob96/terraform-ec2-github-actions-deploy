name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY_B64 }}" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Debug key file
        run: |
          file ~/.ssh/deploy_key
          wc -l ~/.ssh/deploy_key
          head -n 1 ~/.ssh/deploy_key
          tail -n 1 ~/.ssh/deploy_key

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH_OK && whoami && hostname"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /home/ubuntu/flask-app
            sudo docker compose pull
            sudo docker compose up -d --force-recreate
            echo "===== DOCKER PS ====="
            sudo docker ps -a
            echo "===== CONTAINER LOGS ====="
            sudo docker logs flask-app-flask-app-1 || true
            echo "===== PROCESS IN CONTAINER ====="
            sudo docker exec flask-app-flask-app-1 ps aux || true
            echo "===== PORTS IN CONTAINER ====="
            sudo docker exec flask-app-flask-app-1 sh -c "ss -lntp || netstat -lntp" || true
            echo "===== CURL IPV4 ====="
            curl -4 -v http://127.0.0.1:5000
          EOF
